name: ⏪ Rollback to tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to rollback to (ex: v1.2.3)"
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      # -------------------------
      # Checkout repo
      # -------------------------
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_DEPLOY }}

      # -------------------------
      # Validate tag exists
      # -------------------------
      - name: Validate tag
        run: |
          TAG=${{ github.event.inputs.tag }}
          git fetch --tags

          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "❌ Tag $TAG does not exist"
            exit 1
          fi

          echo "TAG=$TAG" >> $GITHUB_ENV

      # -------------------------
      # Checkout target tag
      # -------------------------
      - name: Checkout target tag
        run: |
          git checkout $TAG

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      # -------------------------
      # Tests
      # -------------------------
      - name: Test backend
        run: cd backend && npm run test

      - name: Test frontend
        run: cd frontend && npm test

      # -------------------------
      # Build
      # -------------------------
      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      # -------------------------
      # Git config
      # -------------------------
      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Use PAT for push
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.PAT_DEPLOY }}@github.com/${{ github.repository }}

      # -------------------------
      # Reset prod to tag
      # -------------------------
      - name: Reset prod to tag
        run: |
          git fetch origin prod
          git checkout prod
          git reset --hard $TAG

      # -------------------------
      # Create rollback tag
      # -------------------------
      - name: Tag rollback
        run: |
          DATE=$(date +'%Y.%m.%d-%H%M')
          ROLLBACK_TAG="rollback-$DATE-to-$TAG"

          git tag "$ROLLBACK_TAG"
          echo "ROLLBACK_TAG=$ROLLBACK_TAG" >> $GITHUB_ENV

      # -------------------------
      # Push
      # -------------------------
      - name: Push to prod + tags
        run: |
          git push origin prod --force
          git push origin --tags

      # -------------------------
      # Create GitHub Release (rollback)
      # -------------------------
      - name: Create Rollback Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.ROLLBACK_TAG }}
          name: "Rollback to ${{ env.TAG }}"
          body: |
            ⏪ Rollback effectué

            Target version: ${{ env.TAG }}
            Rollback tag: ${{ env.ROLLBACK_TAG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------
      # Trigger deployments
      # -------------------------
      - name: Trigger Vercel Deploy
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}