name: ⏪ Rollback to commit

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to deploy (full or short)'
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Checkout target commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}
          token: ${{ secrets.PAT_DEPLOY }}
          fetch-depth: 0

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Test backend
        run: cd backend && npm run test

      - name: Test frontend
        run: cd frontend && npm test

      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Use PAT for push
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.PAT_DEPLOY }}@github.com/${{ github.repository }}

      - name: Reset prod to target commit
        run: |
          git fetch origin prod
          git checkout prod
          git reset --hard ${{ github.event.inputs.commit_sha }}

      - name: Tag rollback
        run: |
          VERSION=$(date +'%Y.%m.%d-%H%M')
          git tag "rollback-$VERSION-to-${{ github.event.inputs.commit_sha }}"

      - name: Push to prod
        run: |
          git push origin prod --force
          git push origin --tags

      - name: Trigger Vercel Deploy
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
