name: 🚀 Deploy to Production

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Type de version"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      # -------------------------
      # Verify branch
      # -------------------------
      - name: Verify branch
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "::error::This workflow can only be run from the main branch."
            exit 1
          fi

      # -------------------------
      # Checkout main
      # -------------------------
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_DEPLOY }}
          fetch-depth: 0
          fetch-tags: true

      # -------------------------
      # Ensure main is up to date
      # -------------------------
      - name: Ensure main is up to date
        run: |
          git fetch origin main
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse origin/main)

          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "::error::Local main is not up to date with origin/main"
            exit 1
          fi

      # -------------------------
      # Cache npm
      # -------------------------
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json', 'backend/package-lock.json', 'frontend/package-lock.json') }}

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      # -------------------------
      # Tests
      # -------------------------
      - name: Test backend
        run: cd backend && npm run test

      - name: Test frontend
        run: cd frontend && npm test

      # -------------------------
      # Git config
      # -------------------------
      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Use PAT for push
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.PAT_DEPLOY }}@github.com/${{ github.repository }}

      # -------------------------
      # Check if last commit is release
      # -------------------------
      - name: Check if last commit is a release
        run: |
          LAST_COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Last commit: $LAST_COMMIT_MSG"

          if echo "$LAST_COMMIT_MSG" | grep -q "chore(release):"; then
            echo "SKIP_BUMP=true" >> $GITHUB_ENV
          else
            echo "SKIP_BUMP=false" >> $GITHUB_ENV
          fi

      # -------------------------
      # Generate version and changelog
      # -------------------------
      - name: Generate version and changelog
        if: env.SKIP_BUMP != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_DEPLOY }}
          REPO: ${{ github.repository }}
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
        run: |
          node -e "
            const { execSync } = require('child_process');
            const fs = require('fs');

            // Bump version
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            const [major, minor, patch] = pkg.version.split('.').map(Number);
            const type = process.env.VERSION_TYPE;
            let newVersion;
            if (type === 'major') newVersion = \`\${major + 1}.0.0\`;
            else if (type === 'minor') newVersion = \`\${major}.\${minor + 1}.0\`;
            else newVersion = \`\${major}.\${minor}.\${patch + 1}\`;

            pkg.version = newVersion;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

            // Find last tag date
            let since = '';
            try {
              const lastTag = execSync('git describe --tags --abbrev=0').toString().trim();
              const tagDate = execSync(\`git log -1 --format=%aI \${lastTag}\`).toString().trim();
              since = tagDate;
            } catch {
              since = '2000-01-01T00:00:00Z';
            }

            // Fetch merged PRs since last tag via GitHub API
            const https = require('https');
            const fetch = (url) => new Promise((resolve, reject) => {
              const options = {
                headers: {
                  'Authorization': \`Bearer \${process.env.GITHUB_TOKEN}\`,
                  'User-Agent': 'deploy-script',
                  'Accept': 'application/vnd.github+json',
                },
              };
              https.get(url, options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => resolve(JSON.parse(data)));
              }).on('error', reject);
            });

            (async () => {
              const repo = process.env.REPO;
              const prs = await fetch(\`https://api.github.com/repos/\${repo}/pulls?state=closed&sort=updated&direction=desc&per_page=50\`);
              const newPrs = prs.filter(pr => pr.merged_at && pr.merged_at > since);

              const date = new Date().toISOString().split('T')[0];
              const prLines = newPrs.length > 0
                ? newPrs.map(pr => \`- \${pr.title} (#\${pr.number})\`).join('\n')
                : '- Corrections et améliorations internes';

              const entry = \`## \${newVersion} (\${date})\n\n\${prLines}\n\`;

              const existing = fs.existsSync('CHANGELOG.md') ? fs.readFileSync('CHANGELOG.md', 'utf8') : '';
              const header = '# Changelog\n\n';
              const body = existing.startsWith(header) ? existing.slice(header.length) : existing;
              fs.writeFileSync('CHANGELOG.md', header + entry + '\n' + body);

              // Sync sub-packages
              ['./backend/package.json', './frontend/package.json'].forEach(p => {
                const sub = JSON.parse(fs.readFileSync(p));
                sub.version = newVersion;
                fs.writeFileSync(p, JSON.stringify(sub, null, 2) + '\n');
              });

              fs.writeFileSync('RELEASE_NOTES.md', entry.trim());
              fs.writeFileSync('.new-version', newVersion);
            })();
          "

          VERSION=$(cat .new-version)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          git add package.json backend/package.json frontend/package.json CHANGELOG.md
          git commit -m "chore(release): $VERSION"
          git tag "v$VERSION"

      # -------------------------
      # Fallback version if skipped
      # -------------------------
      - name: Set version if skipped
        if: env.SKIP_BUMP == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV


      # -------------------------
      # Build
      # -------------------------
      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      # -------------------------
      # Save release commit
      # -------------------------
      - name: Save release commit
        run: |
          echo "RELEASE_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      # -------------------------
      # Push main
      # -------------------------
      - name: Push main
        run: |
          git push origin $RELEASE_SHA:main
          git push origin --tags

      # -------------------------
      # Sync prod = main
      # -------------------------
      - name: Update prod from main
        run: |
          git fetch origin prod
          git checkout prod
          git reset --hard origin/main
          git push origin prod --force

      # -------------------------
      # Create GitHub Release
      # -------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_DEPLOY }}

      # -------------------------
      # Trigger deployments
      # -------------------------
      - name: Trigger Vercel Deploy
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}