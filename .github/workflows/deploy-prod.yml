name: 🚀 Deploy to Production

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Type de version"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      # -------------------------
      # Verify branch
      # -------------------------
      - name: Verify branch
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "::error::This workflow can only be run from the main branch."
            exit 1
          fi

      # -------------------------
      # Checkout main
      # -------------------------
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_DEPLOY }}
          fetch-depth: 0
          fetch-tags: true

      # -------------------------
      # Ensure main is up to date
      # -------------------------
      - name: Ensure main is up to date
        run: |
          git fetch origin main
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse origin/main)

          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "::error::Local main is not up to date with origin/main"
            exit 1
          fi

      # -------------------------
      # Cache npm
      # -------------------------
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json', 'backend/package-lock.json', 'frontend/package-lock.json') }}

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      # -------------------------
      # Tests
      # -------------------------
      - name: Test backend
        run: cd backend && npm run test

      - name: Test frontend
        run: cd frontend && npm test

      # -------------------------
      # Git config
      # -------------------------
      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Use PAT for push
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.PAT_DEPLOY }}@github.com/${{ github.repository }}

      # -------------------------
      # Check if last commit is release
      # -------------------------
      - name: Check if last commit is a release
        run: |
          LAST_COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Last commit: $LAST_COMMIT_MSG"

          if echo "$LAST_COMMIT_MSG" | grep -q "chore(release):"; then
            echo "SKIP_BUMP=true" >> $GITHUB_ENV
          else
            echo "SKIP_BUMP=false" >> $GITHUB_ENV
          fi

      # -------------------------
      # Generate version and changelog
      # -------------------------
      - name: Generate version and changelog
        if: env.SKIP_BUMP != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_DEPLOY }}
          REPO: ${{ github.repository }}
          VERSION_TYPE: ${{ github.event.inputs.version_type }}
        run: |
          node -e "
            const { execSync } = require('child_process');
            const fs = require('fs');
            const https = require('https');

            // ── Version bump (synchronous) ────────────────────────────────────
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            const [major, minor, patch] = pkg.version.split('.').map(Number);
            const type = process.env.VERSION_TYPE;
            const newVersion =
              type === 'major' ? \`\${major + 1}.0.0\` :
              type === 'minor' ? \`\${major}.\${minor + 1}.0\` :
                                 \`\${major}.\${minor}.\${patch + 1}\`;

            ['.', './backend', './frontend'].forEach(dir => {
              const p = \`\${dir}/package.json\`;
              const sub = JSON.parse(fs.readFileSync(p));
              sub.version = newVersion;
              fs.writeFileSync(p, JSON.stringify(sub, null, 2) + '\n');
            });

            fs.writeFileSync('.new-version', newVersion);

            // ── Commit messages since last tag (synchronous) ──────────────────
            const date = new Date().toISOString().split('T')[0];
            let commitLines = ['Corrections et améliorations internes'];
            let prNumbers = [];
            try {
              const lastTag = execSync('git describe --tags --abbrev=0').toString().trim();
              const log = execSync(\`git log \${lastTag}..HEAD --format=%s\`).toString().trim();
              const lines = log.split('\n').filter(l => l && !l.startsWith('chore(release)'));
              if (lines.length > 0) commitLines = lines;
              const matches = [...log.matchAll(/#(\\d+)/g)];
              prNumbers = [...new Set(matches.map(m => parseInt(m[1])))];
            } catch { /* no previous tag */ }

            // ── CHANGELOG helpers ─────────────────────────────────────────────
            const buildEntry = (lines) =>
              \`## \${newVersion} (\${date})\n\n\${lines.map(l => \`- \${l}\`).join('\n')}\n\`;

            const writeChangelog = (entry) => {
              const existing = fs.existsSync('CHANGELOG.md') ? fs.readFileSync('CHANGELOG.md', 'utf8') : '';
              const header = '# Changelog\n\n';
              const body = existing.startsWith(header) ? existing.slice(header.length) : existing;
              fs.writeFileSync('CHANGELOG.md', header + entry + '\n' + body);
              fs.writeFileSync('RELEASE_NOTES.md', entry.trim());
            };

            // ── Write CHANGELOG now with commit messages (guaranteed) ─────────
            writeChangelog(buildEntry(commitLines));

            // ── Enrich CHANGELOG with GitHub PR titles (best-effort) ──────────
            if (prNumbers.length === 0) return;

            const fetchPR = (number) => new Promise((resolve) => {
              const options = {
                headers: {
                  Authorization: \`Bearer \${process.env.GITHUB_TOKEN}\`,
                  'User-Agent': 'deploy-script',
                  Accept: 'application/vnd.github+json',
                },
              };
              https.get(\`https://api.github.com/repos/\${process.env.REPO}/pulls/\${number}\`, options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => { try { resolve(JSON.parse(data)); } catch { resolve(null); } });
              }).on('error', () => resolve(null));
            });

            Promise.all(prNumbers.map(fetchPR))
              .then(prs => {
                const merged = prs
                  .filter(pr => pr && pr.merged_at)
                  .sort((a, b) => b.number - a.number);
                if (merged.length > 0) {
                  writeChangelog(buildEntry(merged.map(pr => \`\${pr.title} (#\${pr.number})\`)));
                }
              })
              .catch(() => { /* keep commit-message changelog */ });
          "

          VERSION=$(cat .new-version)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          git add package.json backend/package.json frontend/package.json CHANGELOG.md
          git commit -m "chore(release): $VERSION"
          git tag "v$VERSION"

      # -------------------------
      # Fallback version if skipped
      # -------------------------
      - name: Set version if skipped
        if: env.SKIP_BUMP == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV


      # -------------------------
      # Build
      # -------------------------
      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      # -------------------------
      # Save release commit
      # -------------------------
      - name: Save release commit
        run: |
          echo "RELEASE_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      # -------------------------
      # Push main
      # -------------------------
      - name: Push main
        run: |
          git push origin $RELEASE_SHA:main
          git push origin --tags

      # -------------------------
      # Sync prod = main
      # -------------------------
      - name: Update prod from main
        run: |
          git fetch origin prod
          git checkout prod
          git reset --hard origin/main
          git push origin prod --force

      # -------------------------
      # Create GitHub Release
      # -------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_DEPLOY }}

      # -------------------------
      # Trigger deployments
      # -------------------------
      - name: Trigger Vercel Deploy
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}