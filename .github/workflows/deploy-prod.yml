name: 🚀 Deploy to Production

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Type de version"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      # -------------------------
      # Verify branch
      # -------------------------
      - name: Verify branch
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "::error::This workflow can only be run from the main branch."
            exit 1
          fi

      # -------------------------
      # Checkout main
      # -------------------------
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_DEPLOY }}
          fetch-depth: 0
          fetch-tags: true

      # -------------------------
      # Ensure main is up to date
      # -------------------------
      - name: Ensure main is up to date
        run: |
          git fetch origin main
          LOCAL=$(git rev-parse HEAD)
          REMOTE=$(git rev-parse origin/main)

          if [ "$LOCAL" != "$REMOTE" ]; then
            echo "::error::Local main is not up to date with origin/main"
            exit 1
          fi

      # -------------------------
      # Cache npm
      # -------------------------
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json', 'backend/package-lock.json', 'frontend/package-lock.json') }}

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      # -------------------------
      # Tests
      # -------------------------
      - name: Test backend
        run: cd backend && npm run test

      - name: Test frontend
        run: cd frontend && npm test

      # -------------------------
      # Git config
      # -------------------------
      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Use PAT for push
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.PAT_DEPLOY }}@github.com/${{ github.repository }}

      # -------------------------
      # Check if last commit is release
      # -------------------------
      - name: Check if last commit is a release
        run: |
          LAST_COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Last commit: $LAST_COMMIT_MSG"

          if echo "$LAST_COMMIT_MSG" | grep -q "chore(release):"; then
            echo "SKIP_BUMP=true" >> $GITHUB_ENV
          else
            echo "SKIP_BUMP=false" >> $GITHUB_ENV
          fi

      # -------------------------
      # Generate version (if needed)
      # -------------------------
      - name: Generate version and changelog
        if: env.SKIP_BUMP != 'true'
        run: |
          VERSION_TYPE=${{ github.event.inputs.version_type }}

          if [ "$VERSION_TYPE" = "major" ]; then
            npx standard-version --release-as major
          elif [ "$VERSION_TYPE" = "minor" ]; then
            npx standard-version --release-as minor
          else
            npx standard-version --release-as patch
          fi

          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # -------------------------
      # Fallback version if skipped
      # -------------------------
      - name: Set version if skipped
        if: env.SKIP_BUMP == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # -------------------------
      # Sync versions to sub-packages
      # -------------------------
      - name: Sync versions to sub-packages
        run: |
          VERSION=${{ env.VERSION }}

          node -e "
            const fs = require('fs');

            const update = (path) => {
              const pkg = JSON.parse(fs.readFileSync(path));
              pkg.version = '$VERSION';
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2));
            };

            update('./backend/package.json');
            update('./frontend/package.json');
          "

          git add backend/package.json frontend/package.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit --amend --no-edit
          fi

      # -------------------------
      # Build
      # -------------------------
      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      # -------------------------
      # Save release commit
      # -------------------------
      - name: Save release commit
        run: |
          echo "RELEASE_SHA=$(git rev-parse HEAD)" >> $GITHUB_ENV

      # -------------------------
      # Push main
      # -------------------------
      - name: Push main
        run: |
          git push origin $RELEASE_SHA:main
          git push origin --tags

      # -------------------------
      # Sync prod = main
      # -------------------------
      - name: Update prod from main
        run: |
          git fetch origin prod
          git checkout prod
          git reset --hard origin/main
          git push origin prod --force

      # -------------------------
      # Extract release notes for current version
      # -------------------------
      - name: Extract release notes
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.VERSION;
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const lines = changelog.split('\n');
            let capture = false;
            const notes = [];
            for (const line of lines) {
              if (line.startsWith('## ') || line.startsWith('# ')) {
                if (capture) break;
                if (line.includes(version)) { capture = true; continue; }
              }
              if (capture) notes.push(line);
            }
            fs.writeFileSync('RELEASE_NOTES.md', notes.join('\n').trim());
          "

      # -------------------------
      # Create GitHub Release
      # -------------------------
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_DEPLOY }}

      # -------------------------
      # Trigger deployments
      # -------------------------
      - name: Trigger Vercel Deploy
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}

      - name: Trigger Render Deploy
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}