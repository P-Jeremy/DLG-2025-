name: 🚀 Deploy to Production

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PAT_DEPLOY }}
          fetch-depth: 0

      - name: Install
        run: npm install

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Use PAT for push
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.PAT_DEPLOY }}@github.com/${{ github.repository }}

      - name: Fetch prod
        run: git fetch origin prod

      - name: Merge main → prod
        run: |
          git checkout prod
          git merge origin/main --no-ff -m "🚀 Deploy production"

      - name: Tag version
        run: |
          VERSION=$(date +'%Y.%m.%d-%H%M')
          git tag "prod-$VERSION"

      - name: Push
        run: |
          git push origin prod
          git push origin --tags