name: Keep Alive

on:
  schedule:
    - cron: '*/10 7-21 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping backend with retry + jitter
        run: |
          URL="${{ secrets.BACKEND_URL }}/health"

          # Jitter aléatoire entre 0 et 30 secondes
          JITTER=$((RANDOM % 30))
          echo "Waiting jitter: ${JITTER}s"
          sleep $JITTER

          echo "Pinging $URL"

          for i in {1..6}; do
            START=$(date +%s)

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")

            END=$(date +%s)
            DURATION=$((END - START))

            echo "Attempt $i → status=$STATUS time=${DURATION}s"

            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Service is up"
              exit 0
            fi

            sleep 5
          done

          echo "⚠️ Service did not respond with 200, but continuing"
          exit 0