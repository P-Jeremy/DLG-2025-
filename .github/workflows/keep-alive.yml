name: Keep Alive Smart

on:
  schedule:
    - cron: '*/10 * * * *'
    - cron: '5-59/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Smart ping backend
        run: |
          URL="${{ secrets.BACKEND_URL }}/health"

          echo "Checking $URL"

          START=$(date +%s)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          END=$(date +%s)

          DURATION=$((END - START))

          echo "Initial check → status=$STATUS time=${DURATION}s"

          # Si rapide → app déjà chaude
          if [ "$STATUS" -eq 200 ] && [ "$DURATION" -lt 2 ]; then
            echo "🔥 App already warm, no action needed"
            exit 0
          fi

          echo "💤 App likely sleeping, forcing wake-up..."

          # Wake-up avec retries
          for i in {1..6}; do
            START=$(date +%s)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            END=$(date +%s)
            DURATION=$((END - START))

            echo "Wake attempt $i → status=$STATUS time=${DURATION}s"

            if [ "$STATUS" -eq 200 ]; then
              echo "✅ App is awake"
              exit 0
            fi

            sleep 5
          done

          echo "⚠️ Wake-up attempts finished"
          exit 0
