name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint monorepo
        run: npm run lint

      - name: Install backend devDependencies
        run: cd backend && npm install

      - name: Test backend
        run: npm run test:backend
