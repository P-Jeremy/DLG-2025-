name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch prod
        run: git fetch origin prod

      - name: Ensure branch is up-to-date with prod
        run: |
          if ! git merge-base --is-ancestor origin/prod HEAD; then
            echo "❌ Branche pas à jour avec prod"
            echo "👉 Fais : git merge origin/prod"
            exit 1
          fi

  lint-and-test:
    runs-on: ubuntu-latest
    needs: check-sync

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Lint monorepo
        run: npm run lint

      - name: Test backend
        run: cd backend && npm run test

      - name: Test frontend
        run: cd frontend && npm test